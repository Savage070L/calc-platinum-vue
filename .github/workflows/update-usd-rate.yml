name: Update USD rate from NBRK

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # manual trigger

jobs:
  update-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # GitHub Pages serves from the `main` branch /docs folder.
          # Always operate on that branch so the rate file lands where
          # the live site reads it from.
          ref: main
          fetch-depth: 1

      - name: Fetch USD rate from NBRK
        run: |
          DATE=$(date -u +"%d.%m.%Y")
          URL="https://nationalbank.kz/rss/get_rates.cfm?fdate=${DATE}"

          XML=$(curl -sf --max-time 15 "$URL" || true)

          if [ -z "$XML" ]; then
            echo "::warning::NBRK request failed, keeping existing file"
            exit 0
          fi

          # Parse rate and date from XML
          RATE=$(echo "$XML" | grep -A2 '<title>USD</title>' | grep '<description>' | sed 's/.*<description>\(.*\)<\/description>.*/\1/' | tr -d '[:space:]')
          FDATE=$(echo "$XML" | grep '<date>' | head -1 | sed 's/.*<date>\(.*\)<\/date>.*/\1/' | tr -d '[:space:]')

          if [ -z "$RATE" ]; then
            echo "::warning::Could not parse USD rate, keeping existing file"
            exit 0
          fi

          echo "Parsed rate: $RATE, date: $FDATE"

          # Write JSON
          cat > docs/usd-rate.json <<EOF
          {
            "rate": ${RATE},
            "date": "${FDATE}",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          # Clean up leading spaces from heredoc
          sed -i 's/^          //' docs/usd-rate.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/usd-rate.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update USD rate from NBRK"
            git push origin HEAD:main
          fi
